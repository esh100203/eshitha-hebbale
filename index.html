<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <meta name="description" content="Eshitha Hebbale — Architectural Portfolio" />
    <title>Eshitha Hebbale</title>
    <meta property="og:title" content="Eshitha Hebbale" />
    <meta property="og:description" content="Architectural Portfolio" />
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://eshitha-hebbale.vercel.app/" />
    <meta name="twitter:card" content="summary" />
    <meta name="twitter:title" content="Eshitha Hebbale" />
    <meta name="twitter:description" content="Architectural Portfolio" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Josefin+Sans:ital,wght@0,100..700;1,100..700&family=Orbitron:wght@400;700;900&family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;1,300;1,400;1,500;1,600&family=Bebas+Neue&display=swap" rel="stylesheet" />

    <script type="importmap">
    {
      "imports": {
        "three": "https://cdn.jsdelivr.net/npm/three@0.158.0/build/three.module.js",
        "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.158.0/examples/jsm/"
      }
    }
    </script>

    <!-- GSAP as global before modules -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>

    <link rel="stylesheet" href="style.css" />
  </head>
  <body>

    <!-- LOADER -->
    <div class="loader">
      <span><h1 class="loader_title">Eshitha Hebbale</h1></span>
      <div class="loader_line"></div>
      <span>
        <div class="loader_sub">
          <div class="loader_number">0</div>
          <div class="loader_subtitle">architecture portfolio</div>
        </div>
      </span>
    </div>

    <!-- MENU PANEL -->
    <div class="menu">
      <div class="menu_canvas_container">
        <div class="menu_image_placeholder"></div>
      </div>
    </div>

    <div class="menu_text">
      <div class="search_bar">
        <svg xmlns="http://www.w3.org/2000/svg" height="24px" viewBox="0 -960 960 960" width="24px" fill="#ffffff">
          <path d="M784-120 532-372q-30 24-69 38t-83 14q-109 0-184.5-75.5T120-580q0-109 75.5-184.5T380-840q109 0 184.5 75.5T640-580q0 44-14 83t-38 69l252 252-56 56ZM380-400q75 0 127.5-52.5T560-580q0-75-52.5-127.5T380-760q-75 0-127.5 52.5T200-580q0 75 52.5 127.5T380-400Z"/>
        </svg>
        <input type="text" placeholder="Search a project" id="search_input" />
      </div>
      <div class="menu_main_links">
        <span><a href="#home" class="nav_link" data-page="home">Home</a></span>
        <span><a href="#gallery" class="nav_link" data-page="gallery">Projects</a></span>
        <span><a href="#" class="nav_link" id="menu_contact_toggle">Contact</a></span>
      </div>
      <div class="menu_line"></div>
      <div class="menu_links">
        <ul id="menu_projects_list"></ul>
        <div class="menu_contact_block" id="menu_contact_block">
          <span class="menu_contact_tagline">Here to shape spaces worth remembering.</span>
          <a href="tel:+916362513743" class="menu_contact_line">+91 6362513743</a>
          <a href="mailto:eshithahebbale@gmail.com" class="menu_contact_line">eshithahebbale@gmail.com</a>
        </div>
      </div>
    </div>

    <span class="menu_button menu_open"><button>menu</button></span>
    <span class="menu_button menu_close"><button>close</button></span>

    <!-- CONTROLS OVERLAY (desktop) -->
    <div class="controls" id="controls_overlay">
      <div class="ctrl_group">
        <span class="ctrl_label">Move</span>
        <div class="ctrl_keys">
          <div class="ctrl_keys_row"><div class="ctrl_key">↑</div></div>
          <div class="ctrl_keys_row"><div class="ctrl_key">↓</div></div>
        </div>
      </div>
      <div class="ctrl_group">
        <span class="ctrl_label">Rotate</span>
        <div class="ctrl_keys">
          <div class="ctrl_keys_row">
            <div class="ctrl_key">←</div>
            <div class="ctrl_key">→</div>
          </div>
        </div>
      </div>
      <div class="ctrl_group">
        <div class="ctrl_key ctrl_key_wide">ESC</div>
        <span class="ctrl_label">Open / Close Menu</span>
      </div>
      <div class="ctrl_group">
        <div class="ctrl_key">↵</div>
        <span class="ctrl_label">See details</span>
      </div>
    </div>

    <!-- MOBILE JOYSTICK -->
    <div class="joystick_container" id="joystick_container"></div>

    <!-- SCENE HINT -->
    <div class="scene_blur_overlay" id="scene_blur_overlay"></div>
    <div class="scene_hint" id="scene_hint">Walk up to a frame to explore</div>

<main class="main"></main>
    <canvas class="webgl"></canvas>

    <script type="module" src="src/main.js"></script>
  </body>
</html>
